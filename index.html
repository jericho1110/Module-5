<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <nav>
        <div class="row">
            <div class="nav__logo">
                <img src="./assets/logo.png" class="nav__logo--img" alt="Logo">
                <div class="nav__logo--title">JB's Movies</div>
            </div>
            <div class="nav__links">
                <a href="#" class="nav__link" id="link-home">Home</a>
                <a href="#" class="nav__link" id="link-movies">Movies</a>
                <a href="#" class="nav__link" id="link-mylist">My List</a>
            </div>
        </div>
    </nav>
    <section id="landing">
        <div class="row">
        <div class="landing">
            <div class="description">
                <h1 class="landing__title">Welcome to JB's Movies.</h1>
                <h2 class="landing__subtitle">Discover and watch your favorite movies.</h2>
            </div>
            <div class="search">
                <input type="text" class="landing__search" placeholder="Search for movies...">
                <button class="landing__button">Search</button>
            </div>
        </div>
        </div>
    </section>
    <section id="movies">
        <div class="container">
            <h2 class="movies__title">Movie Results</h2>
            <div class="movies__list"></div>
        </div>
    </section>
<footer>
    <div class="row footer__row">
        <div class="footer__links">
            <a href="#" class="footer__link" id="footer-home">Home</a>
            <a href="#" class="footer__link" id="footer-movies">Movies</a>
            <a href="#" class="footer__link" id="footer-mylist">My List</a>
        </div>
        <div class="copyright">
            <p>&copy; 2023 JB's Movies. All rights reserved.</p>
        </div>
    </div>
</footer>
<script src="./api.js"></script>
</body>
</html>

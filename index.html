<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <nav>
        <div class="row">
            <div class="nav__logo">
                <img src="./assets/logo.png" class="nav__logo--img" alt="Logo">
                <div class="nav__logo--title">JB's Movies</div>
            </div>
            <div class="nav__links">
                <a href="#" class="nav__link">Home</a>
                <a href="#" class="nav__link">Movies</a>                
                <a href="#" class="nav__link nav__link--list">My List</a>
            </div>
        </div>        
    </nav>
    <section ID="landing">
        <div class="row">
        <div class="landing">
            <div class="description">
                <h1 class="landing__title">Welcome to JB's Movies.</h1>
                <h2 class="landing__subtitle">Discover and watch your favorite movies.</h2>
            </div>
            <div class="search">
                <input type="text" class="landing__search" placeholder="Search for movies...">
                <button class="landing__button">Search</button>
            </div>
        </div>            
        </div>
    </section>
    <section id="movies">
        <div class="container">
            <div class="row">
                <h2 class="movies__title">Movies</h2>
                <div class="movies__list">
                    <!-- Movie items will be dynamically added here -->
                </div>
            </div>
        </div>
    </section>
<footer>
    <div class="row footer__row">
        <div class="footer__links">
            <a href="#" class="footer__link">Home</a>
            <a href="#" class="footer__link">Movies</a>                
            <a href="#" class="footer__link footer__link--list">My List</a>
        </div>
        <div class="copyright">
            <p> &copy; 2023 JB's Movies. All rights reserved.</p>
        </div>
    </div>
</footer>
</body>
</html>
